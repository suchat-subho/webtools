<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOT Graph Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="container">

  <!-- ── Left pane: input ── -->
  <div id="left-pane">
    <h2 id="pane-title">DOT Graph Input</h2>

    <!-- Mode toggle -->
    <div id="mode-toggle">
      <button id="btn-mode-dot"     class="active">DOT</button>
      <button id="btn-mode-netlist">Netlist</button>
    </div>

    <!-- Editor with line numbers -->
    <div id="editor-wrap">
      <div id="line-numbers" aria-hidden="true"></div>
      <textarea id="netlistBox" spellcheck="false"></textarea>
    </div>

    <!-- DOT preview (shown when converting netlist) -->
    <div id="dot-preview"></div>

    <!-- Error display -->
    <div id="error-msg"></div>

    <!-- Action buttons -->
    <div id="buttons">
      <button id="btn-render">Render</button>
      <button id="btn-convert">Convert → DOT</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-export">Export PNG</button>
    </div>
  </div>

  <!-- ── Right pane: canvas ── -->
  <div id="right-pane">
    <canvas id="circuitCanvas"></canvas>
  </div>

</div>

<!-- Dependencies -->
<script src="https://unpkg.com/@viz-js/viz@3.2.4/lib/viz-standalone.js"></script>
<script src="scripts/converter.js"></script>
<script src="scripts/graph.js"></script>

<!-- Page controller -->
<script>
(function () {
  'use strict';

  /* ── Examples ── */
  var EXAMPLE_DOT =
'digraph Architecture {\n' +
'  rankdir=LR;\n' +
'  node [shape=box];\n' +
'\n' +
'  Client -> "Load Balancer";\n' +
'  "Load Balancer" -> "Web Server 1";\n' +
'  "Load Balancer" -> "Web Server 2";\n' +
'  "Web Server 1" -> "App Server";\n' +
'  "Web Server 2" -> "App Server";\n' +
'  "App Server" -> Cache [label="check"];\n' +
'  "App Server" -> Database [label="query"];\n' +
'  Cache -> "App Server" [label="hit", style=dashed];\n' +
'}';

  var EXAMPLE_NETLIST =
'* Example Netlist with Transistor and 555 Timer\n' +
'V1 N001 0 DC 5\n' +
'R1 N001 N002 10k\n' +
'C1 N002 0 10u\n' +
'Q1 N002 N003 N004 NPN\n' +
'R2 N003 0 4.7k\n' +
'L1 N004 0 2mH\n' +
'D1 N004 N002 1N4148\n' +
'U1 N005 N006 N007 N008 N009 N010 N011 N012 555';

  /* ── DOM refs ── */
  var textarea   = document.getElementById('netlistBox');
  var gutterEl   = document.getElementById('line-numbers');
  var dotPreview = document.getElementById('dot-preview');
  var errorEl    = document.getElementById('error-msg');
  var paneTitle  = document.getElementById('pane-title');
  var btnConvert = document.getElementById('btn-convert');

  /* ── Mode ── */
  var currentMode = 'dot';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-mode-dot').classList.toggle('active',     mode === 'dot');
    document.getElementById('btn-mode-netlist').classList.toggle('active', mode === 'netlist');
    paneTitle.textContent          = mode === 'dot' ? 'DOT Graph Input' : 'Netlist Input';
    btnConvert.style.display       = mode === 'netlist' ? '' : 'none';
    dotPreview.style.display       = 'none';
    dotPreview.textContent         = '';
    errorEl.style.display          = 'none';
    textarea.value                 = mode === 'dot' ? EXAMPLE_DOT : EXAMPLE_NETLIST;
    updateLineNumbers();
    /* Clear canvas */
    nodes = []; edges = [];
    draw();
  }

  /* ── Line numbers ── */
  function updateLineNumbers() {
    var count = textarea.value.split('\n').length;
    var html  = '';
    for (var i = 1; i <= count; i++) html += '<span>' + i + '</span>';
    gutterEl.innerHTML   = html;
    gutterEl.scrollTop   = textarea.scrollTop;
  }

  textarea.addEventListener('input',  updateLineNumbers);
  textarea.addEventListener('scroll', function () { gutterEl.scrollTop = textarea.scrollTop; });
  textarea.addEventListener('keydown', function (e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = textarea.selectionStart, en = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, s) + '  ' + textarea.value.substring(en);
      textarea.selectionStart = textarea.selectionEnd = s + 2;
      updateLineNumbers();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      handleRender();
    }
  });

  /* ── Error helpers (app-level, above canvas errors) ── */
  function showAppError(msg) {
    errorEl.textContent   = msg;
    errorEl.style.display = 'block';
  }
  function clearAppError() {
    errorEl.style.display = 'none';
  }

  /* ── Render ── */
  function handleRender() {
    clearAppError();
    if (currentMode === 'netlist') {
      var src = textarea.value.trim();
      if (!src) { showAppError('Netlist is empty.'); return; }
      var result = netlistToDot(src, { rankdir: 'LR' });
      if (result.errors.length) showAppError(result.errors.join('\n'));
      dotPreview.textContent = result.dot;
      dotPreview.style.display = 'block';
      /* Temporarily swap textarea value so renderCircuit() reads the DOT */
      var orig = textarea.value;
      textarea.value = result.dot;
      renderCircuit();          /* defined in graph.js */
      textarea.value = orig;
      updateLineNumbers();
    } else {
      renderCircuit();          /* defined in graph.js */
    }
  }

  /* ── Convert → DOT (preview only, no render) ── */
  function handleConvert() {
    clearAppError();
    var src = textarea.value.trim();
    if (!src) { showAppError('Netlist is empty.'); return; }
    var result = netlistToDot(src, { rankdir: 'LR' });
    if (result.errors.length) showAppError(result.errors.join('\n'));
    dotPreview.textContent   = result.dot;
    dotPreview.style.display = dotPreview.style.display === 'block' ? 'none' : 'block';
  }

  /* ── Button wiring ── */
  document.getElementById('btn-mode-dot').addEventListener('click',     function () { setMode('dot'); });
  document.getElementById('btn-mode-netlist').addEventListener('click', function () { setMode('netlist'); });
  document.getElementById('btn-render').addEventListener('click',  handleRender);
  document.getElementById('btn-convert').addEventListener('click', handleConvert);
  document.getElementById('btn-reset').addEventListener('click',   function () { setMode(currentMode); });
  document.getElementById('btn-export').addEventListener('click',  exportPNG);  /* defined in graph.js */

  /* ── Init ── */
  btnConvert.style.display = 'none';
  textarea.value = EXAMPLE_DOT;
  updateLineNumbers();

}());
</script>

</body>
</html>
