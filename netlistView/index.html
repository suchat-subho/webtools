<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Netlist Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="container">

  <div id="left-pane">
    <h2 id="pane-title">DOT Graph Input</h2>

    <div id="mode-toggle">
      <button id="btn-mode-dot" class="active">DOT</button>
      <button id="btn-mode-netlist">Netlist (Graph)</button>
      <button id="btn-mode-schematic">Netlist (Schematic)</button>
    </div>

    <div id="editor-wrap">
      <div id="line-numbers" aria-hidden="true"></div>
      <textarea id="netlistBox" spellcheck="false"></textarea>
    </div>

    <div id="dot-preview"></div>

    <div id="error-msg"></div>

    <div id="buttons">
      <button id="btn-render">Render</button>
      <button id="btn-convert">Convert → DOT</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-export">Export PNG</button>
    </div>
  </div>

  <div id="right-pane">
    <canvas id="circuitCanvas"></canvas>
  </div>

</div>

<script src="https://unpkg.com/@viz-js/viz@3.2.4/lib/viz-standalone.js"></script>

<script src="scripts/converter.js"></script>
<script src="scripts/graph.js"></script>
<script src="scripts/schematic.js"></script>

<script src="scripts/ui-helpers.js"></script>
<script src="scripts/handlers.js"></script>
<script src="scripts/app.js"></script>

</body>
</html>
