<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Crossword Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h3>Controls</h3>

  <label>Log Level:
    <select id="logLevel">
      <option value="0">None</option>
      <option value="1">Error</option>
      <option value="2" selected>Info</option>
      <option value="3">Debug</option>
    </select>
  </label>

  <button id="undoButton">Undo</button>

  <textarea id="gridInput" placeholder="Enter Game matrix here ..."></textarea>
  <button id="loadButton">Load Grid</button>
  <button id="checkButton">Check</button>
  <hr>
  <a href="data/g1.html" target="_blank" rel="noopener noreferrer">Sample G1</a>
  <a href="data/g2.html" target="_blank" rel="noopener noreferrer">Sample G2</a>
</div>

<div class="main">
  <div class="grid-wrapper">
  <div class="corner"></div>
  <table id="grid-col-header"></table>
  <table id="grid-row-header"></table>
  <table id="grid"></table>
</div>
<div class="pool" id="pool"></div>
</div>

<script src="interface.js"></script>
</body>
</html>
