<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game-Instance</title>

<link rel="stylesheet" href="data.css">
</head>

<body>

<h2>Game-Instance-G2</h2>

<div class="container">
    <!-- Editable TSV -->
    <textarea id="tsvInput">
.   .   B   x   B   =   37  .   .   .   .
.   .   /   .   .   .   .   .   .   .   .
B   .   B   +   40  =   B   .   B   .   .
+   .   =   .   +   .   .   .   +   .   .
23  .   37  +   B   =   50  .   1   .   30
=   .   .   .   =   .   +   .   =   .   -
48  +   B   =   B   .   B   x   B   =   24

.   .   57  -   B   =   B   .   .   .   B
.   .   =   .   .   .   .   .   .   .   .
70  -   B   =   8   .   .   .   .   .   .


<1  1   1   3 4 5 6 6 13 25 37 41 53 56 62>
    </textarea>

    <!-- Rendered View -->
    <pre id="tsvOutput"></pre>
</div>

<button onclick="renderTSV()">Render</button>
<button onclick="copyTSV()">Copy TSV</button>

<script>
function renderTSV() {
    const input = document.getElementById("tsvInput").value;
    document.getElementById("tsvOutput").textContent = input;
}

// Copy raw TSV (with tabs preserved)
function copyTSV() {
    const text = document.getElementById("tsvInput").value;
    navigator.clipboard.writeText(text);
    alert("TSV copied!");
}

// Initial render
renderTSV();
</script>

</body>
</html>
