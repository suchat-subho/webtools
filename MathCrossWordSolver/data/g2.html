<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TSV Viewer</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f7fa;
}

.container {
    display: flex;
    gap: 20px;
}

textarea {
    width: 50%;
    height: 400px;
    font-family: monospace;
    font-size: 14px;
    white-space: pre;
    tab-size: 4;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

pre {
    width: 50%;
    height: 400px;
    overflow: auto;
    background: #fff;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-family: monospace;
    tab-size: 4;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}
</style>
</head>

<body>

<h2>TSV Viewer (Copy-safe)</h2>

<div class="container">
    <!-- Editable TSV -->
    <textarea id="tsvInput">
.   .   B   x   B   =   37  .   .   .   .
.   .   /   .   .   .   .   .   .   .   .
B   .   B   +   40  =   B   .   B   .   .
+   .   =   .   +   .   .   .   +   .   .
23  .   37  +   B   =   50  .   1   .   30
=   .   .   .   =   .   +   .   =   .   -
48  +   B   =   B   .   B   x   B   =   24
.   .   +   .   .   .   =   .   .   .   =
.   .   57  -   B   =   B   .   .   .   B
.   .   =   .   .   .   .   .   .   .   .
70  -   B   =   8   .   .   .   .   .   .


<1  1   1   3 4 5 6 6 13 25 37 41 53 56 62>
    </textarea>

    <!-- Rendered View -->
    <pre id="tsvOutput"></pre>
</div>

<button onclick="renderTSV()">Render</button>
<button onclick="copyTSV()">Copy TSV</button>

<script>
function renderTSV() {
    const input = document.getElementById("tsvInput").value;
    document.getElementById("tsvOutput").textContent = input;
}

// Copy raw TSV (with tabs preserved)
function copyTSV() {
    const text = document.getElementById("tsvInput").value;
    navigator.clipboard.writeText(text);
    alert("TSV copied!");
}

// Initial render
renderTSV();
</script>

</body>
</html>
