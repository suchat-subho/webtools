<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game-Instance</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}

/* Left pane (image) */
.left-pane {
    width: 251px;
}

/* Fixed image size */
.left-pane img {
    width: 251px;
    height: 520px;
    object-fit: contain;
    border: 1px solid #ccc;
}

/* Right pane */
.right-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
}

textarea {
    width: 100%;
    height: 320px;
    font-family: monospace;
}

pre {
    background: #f4f4f4;
    padding: 10px;
    margin-top: 10px;
}
</style>

</head>

<body>

<h2>Game-Instance-G4</h2>

<div class="container">

    <!-- LEFT: Image -->
    <div class="left-pane">
        <img src="ss/g4.drawio.png" alt="Game Instance">
    </div>

    <!-- RIGHT: TSV -->
    <div class="right-pane">

        <textarea id="tsvInput">
.   .   .   .   B   x   1   =   24  .   .
.   .   .   .   +   .   .   .   .   .   .
.   .   22  +   27  =   B   .   5   .   45
.   .   .   .   =   .   -   .   x   .   /
B   +   6   =   51  .   B   -   B   =   B
/   .   -   .   .   .   =   .   =   .   =
B   .   5   +   B   =   B   .   B   .   9
=   .   =   .   -   .   .   .   .   .   .
45  .   B   .   B   +   B   =   67  .   .
.   .   .   .   =   .   .   .   .   .   .
.   .   66  -   B   =   50  .   .   .   .

<1 1 2 5 7 10 16 21 24 37 42 45 46 49>
        </textarea>

        <pre id="tsvOutput"></pre>

    </div>

</div>

<br>

<button onclick="renderTSV()">Render</button>
<button onclick="copyTSV()">Copy TSV</button>

<script>
function renderTSV() {
    const input = document.getElementById("tsvInput").value;
    document.getElementById("tsvOutput").textContent = input;
}

function copyTSV() {
    const text = document.getElementById("tsvInput").value;
    navigator.clipboard.writeText(text);
    alert("TSV copied!");
}

// Initial render
renderTSV();
</script>

</body>
</html>
